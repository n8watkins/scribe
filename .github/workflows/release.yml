name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      flavor:
        description: "Build flavor: stable (Scribe) or dev (Scribe Dev, side-by-side)"
        type: choice
        options:
          - stable
          - dev
        default: stable

permissions:
  contents: write

env:
  # Built from source with Vulkan GPU support — upstream ships no prebuilt
  # Vulkan-Windows binary (CPU + CUDA only, ggml-org/whisper.cpp#3673). v1.9.1
  # was validated on the RX 7800 XT (detects + engages); see GPU_VULKAN_SPIKE.md.
  WHISPER_CPP_VERSION: v1.9.1

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          vulkan_version: 1.4.350.0
          install_runtime: true
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build whisper.cpp from source with Vulkan
        shell: pwsh
        run: |
          $src = "$env:RUNNER_TEMP\wcpp"
          git clone --depth 1 --branch "$env:WHISPER_CPP_VERSION" https://github.com/ggml-org/whisper.cpp $src
          Push-Location $src
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            -DGGML_NATIVE=OFF `
            -DBUILD_SHARED_LIBS=ON `
            -DWHISPER_BUILD_EXAMPLES=ON `
            -DWHISPER_BUILD_TESTS=OFF `
            -DWHISPER_BUILD_SERVER=ON
          cmake --build build -j
          Pop-Location
          $cli = Get-ChildItem -Path "$src\build" -Recurse -Filter whisper-cli.exe | Select-Object -First 1
          if (-not $cli) { throw "whisper-cli.exe not found after the Vulkan build" }
          $bin = Split-Path $cli.FullName
          $dest = "app/src-tauri/resources/bin/windows"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          # Same set the app bundles, plus the Vulkan backend DLL. ggml-cpu.dll
          # stays present so the build still runs on machines with no GPU.
          $needed = @("whisper-cli.exe", "whisper-server.exe", "whisper.dll", "ggml.dll", "ggml-base.dll", "ggml-cpu.dll", "ggml-vulkan.dll")
          foreach ($name in $needed) {
            $file = Get-ChildItem -Path $bin -Recurse -Filter $name | Select-Object -First 1
            if (-not $file) { throw "Missing $name in the Vulkan build output" }
            Copy-Item $file.FullName -Destination $dest
          }
          Get-ChildItem $dest | Select-Object Name,Length

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Backend tests
        working-directory: app/src-tauri
        run: cargo test

      - name: Build installers
        working-directory: app
        shell: pwsh
        env:
          # Signs the NSIS updater artifact (createUpdaterArtifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ("${{ github.event.inputs.flavor }}" -eq "dev") {
            Write-Host "Building Scribe Dev flavor (com.natkins.scribe.dev, installs side-by-side)"
            npm run tauri -- build --config src-tauri/tauri.dev-flavor.conf.json
          } else {
            npm run tauri build
          }

      # The in-app updater fetches latest.json from the latest release; it
      # points at the signed NSIS installer of this release.
      - name: Generate updater manifest (latest.json)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $nsisDir = "app/src-tauri/target/release/bundle/nsis"
          $setup = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No NSIS setup exe found" }
          $sigFile = "$($setup.FullName).sig"
          if (-not (Test-Path $sigFile)) { throw "No updater signature next to $($setup.Name); is TAURI_SIGNING_PRIVATE_KEY set?" }
          $tag = "${{ github.ref_name }}"
          $manifest = [ordered]@{
            version  = $tag.TrimStart("v")
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content $sigFile -Raw).Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/$tag/$($setup.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content "$nsisDir/latest.json" -Encoding utf8
          Get-Content "$nsisDir/latest.json"

      - name: Attach installers to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*-setup.exe
            app/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            app/src-tauri/target/release/bundle/nsis/latest.json
            app/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true

      - name: Upload installers as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: scribe-installers
          path: |
            app/src-tauri/target/release/bundle/nsis/*-setup.exe
            app/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            app/src-tauri/target/release/bundle/msi/*.msi
