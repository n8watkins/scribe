name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      flavor:
        description: "Build flavor: stable (Scribe) or dev (Scribe Dev, side-by-side)"
        type: choice
        options:
          - stable
          - dev
        default: stable

permissions:
  contents: write

env:
  WHISPER_CPP_VERSION: v1.8.6

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Fetch whisper.cpp binaries
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\whisper-bin-x64.zip"
          $extract = "$env:RUNNER_TEMP\whisper-bin"
          Invoke-WebRequest -Uri "https://github.com/ggml-org/whisper.cpp/releases/download/$env:WHISPER_CPP_VERSION/whisper-bin-x64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $extract
          $dest = "app/src-tauri/resources/bin/windows"
          $needed = @("whisper-cli.exe", "whisper-server.exe", "whisper.dll", "ggml.dll", "ggml-base.dll", "ggml-cpu.dll")
          foreach ($name in $needed) {
            $file = Get-ChildItem -Path $extract -Recurse -Filter $name | Select-Object -First 1
            if (-not $file) { throw "Missing $name in whisper.cpp release zip" }
            Copy-Item $file.FullName -Destination $dest
          }
          Get-ChildItem $dest

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Backend tests
        working-directory: app/src-tauri
        run: cargo test

      # Inject the real Google OAuth "Desktop app" credentials so released
      # builds can do Drive sync. google_secrets.rs is gitignored (build.rs
      # creates a placeholder when missing), so without this every release ships
      # "not configured". Desktop OAuth secrets are not truly confidential, but
      # they live in repo secrets (not the public source) to dodge auto-rotation.
      - name: Write Google OAuth secrets
        shell: pwsh
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if (-not $env:GOOGLE_CLIENT_ID) {
            Write-Host "GOOGLE_CLIENT_ID not set; Drive sync stays 'not configured'."
            exit 0
          }
          @"
          //! Generated in CI from repo secrets. Not committed.
          pub const CLIENT_ID: &str = "$($env:GOOGLE_CLIENT_ID)";
          pub const CLIENT_SECRET: &str = "$($env:GOOGLE_CLIENT_SECRET)";
          "@ | Set-Content -Path "app/src-tauri/src/google_secrets.rs" -Encoding utf8
          Write-Host "Wrote real google_secrets.rs"

      - name: Build installers
        working-directory: app
        shell: pwsh
        env:
          # Signs the NSIS updater artifact (createUpdaterArtifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ("${{ github.event.inputs.flavor }}" -eq "dev") {
            Write-Host "Building Scribe Dev flavor (com.natkins.scribe.dev, installs side-by-side)"
            npm run tauri -- build --config src-tauri/tauri.dev-flavor.conf.json
          } else {
            npm run tauri build
          }

      # The in-app updater fetches latest.json from the latest release; it
      # points at the signed NSIS installer of this release.
      - name: Generate updater manifest (latest.json)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $nsisDir = "app/src-tauri/target/release/bundle/nsis"
          $setup = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No NSIS setup exe found" }
          $sigFile = "$($setup.FullName).sig"
          if (-not (Test-Path $sigFile)) { throw "No updater signature next to $($setup.Name); is TAURI_SIGNING_PRIVATE_KEY set?" }
          $tag = "${{ github.ref_name }}"
          $manifest = [ordered]@{
            version  = $tag.TrimStart("v")
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content $sigFile -Raw).Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/$tag/$($setup.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content "$nsisDir/latest.json" -Encoding utf8
          Get-Content "$nsisDir/latest.json"

      - name: Attach installers to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*-setup.exe
            app/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            app/src-tauri/target/release/bundle/nsis/latest.json
            app/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true

      - name: Upload installers as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: scribe-installers
          path: |
            app/src-tauri/target/release/bundle/nsis/*-setup.exe
            app/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            app/src-tauri/target/release/bundle/msi/*.msi
